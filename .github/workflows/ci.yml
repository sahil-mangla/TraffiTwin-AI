name: TraffiTwin CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true

    - name: Pull Git LFS objects (model weights)
      run: git lfs pull

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: '.python-version'
        cache: 'pip'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # requirements.txt / requirements-dev.txt are pip-compile-generated
        # lockfiles (exact pins) — see requirements.in / requirements-dev.in
        # for the source of truth and how to regenerate them.
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Static type check with mypy
      # Advisory for now: the codebase predates mypy and carries ~60 pre-
      # existing type errors unrelated to any single change. Surfacing them
      # without blocking every PR on a backlog no one change caused — same
      # two-tier pattern as flake8's --exit-zero complexity pass above.
      # Tighten to blocking once the backlog is paid down.
      continue-on-error: true
      run: |
        mypy backend --ignore-missing-imports

    - name: Scan Python dependencies for known vulnerabilities
      run: |
        pip-audit -r requirements.txt

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term --cov-fail-under=85

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 14

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Lint Frontend
      run: |
        cd frontend
        npm run lint

    - name: Run Frontend tests
      run: |
        cd frontend
        npm run test

    - name: Install Playwright browsers
      run: |
        cd frontend
        npx playwright install --with-deps chromium

    - name: Run end-to-end tests
      run: |
        cd frontend
        npm run test:e2e
      env:
        CI: true

    - name: Scan Frontend dependencies for known vulnerabilities
      run: |
        cd frontend
        npm audit --audit-level=high

    - name: Build Frontend
      run: |
        cd frontend
        npm run build

    - name: Upload Frontend Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist
        retention-days: 1

  deploy:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        lfs: true

    - name: Download Frontend Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-dist
        path: frontend/dist

    - name: Pull Git LFS objects
      run: git lfs pull

    # Backend Deployment to Hugging Face Spaces
    - name: Deploy Backend to Hugging Face Spaces
      env:
        HF_USERNAME: ${{ secrets.HF_USERNAME }}
        HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        if [ -z "$HF_TOKEN" ] || [ -z "$HF_USERNAME" ] || [ -z "$HF_SPACE_NAME" ]; then
          echo "Hugging Face secrets not configured. Skipping backend deploy."
        else
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          # Push to HF Space
          git remote add hf https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          git push -f hf main
        fi

    # Frontend Deployment to Firebase Hosting
    - name: Deploy Frontend to Firebase Hosting
      uses: FirebaseExtended/action-hosting-deploy@v0
      with:
        repoToken: ${{ secrets.GITHUB_TOKEN }}
        firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        projectId: traffitwin-ai
        channelId: live
        entryPoint: frontend
      env:
        FIREBASE_CLI_PREV: 1
